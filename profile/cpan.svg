
      <svg
        width="300"
        height="206"
        viewBox="0 0 300 206"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        role="img"
        aria-labelledby="descId"
      >
        <title id="titleId"></title>
        <desc id="descId"></desc>
        <style>
          .header {
            font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
            fill: #2f80ed;
            animation: fadeInAnimation 0.8s ease-in-out forwards;
          }
          @supports(-moz-appearance: auto) {
            /* Selector detects Firefox */
            .header { font-size: 15.5px; }
          }
          
    .stagger { opacity: 0; animation: fadeInAnimation 0.3s ease-in-out forwards; }
  

          
      /* Animations */
      @keyframes scaleInAnimation {
        from {
          transform: translate(-5px, 5px) scale(0);
        }
        to {
          transform: translate(-5px, 5px) scale(1);
        }
      }
      @keyframes fadeInAnimation {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    
          
        </style>

        

        <rect
          data-testid="card-bg"
          x="0.5"
          y="0.5"
          rx="4.5"
          height="99%"
          stroke="#e4e2e2"
          width="299"
          fill="#fffefe"
          stroke-opacity="1"
        />

        
      <g
        data-testid="card-title"
        transform="translate(25, 35)"
      >
        <g transform="translate(0, 0)">
      <text
        x="0"
        y="0"
        class="header"
        data-testid="header"
      >CPAN &#8212; Mauro Berlanda</text>
    </g>
      </g>
    

        <g
          data-testid="main-card-body"
          transform="translate(0, 55)"
        >
          <g transform="translate(25, 0)">
      <text x="2" y="12" font-size="11" fill="#434d58" opacity="0.7">PAUSE ID</text>
      <text x="2" y="34" font-size="20" font-weight="600" fill="#434d58">KUPTA</text>
      <text x="127" y="12" font-size="11" fill="#434d58" opacity="0.7">Distributions</text>
      <text x="127" y="34" font-size="20" font-weight="600" fill="#434d58">2</text></g><line x1="25" y1="48" x2="275" y2="48" stroke="#434d58" stroke-width="1" opacity="0.15"/>
    <g class="stagger" style="animation-delay: 450ms" transform="translate(25, 56)">
      <text x="2" y="13" font-size="11" fill="#434d58">Bundler-MultiGem</text>
      <text x="250" y="13" font-size="11" fill="#434d58" text-anchor="end">0.02</text>
      
    <svg width="180" x="0" y="20">
      <rect data-testid="progress-background" rx="5" ry="5" x="0" y="0" width="180" height="8" fill="#fffefe"></rect>
      <svg data-testid="lang-progress" width="100%">
        <rect
            height="8"
            fill="#00758F"
            rx="5" ry="5" x="0" y="0"
            class="lang-progress"
            style="animation-delay: 450ms;"
        />
      </svg>
    </svg>
  
    </g>
    <g class="stagger" style="animation-delay: 600ms" transform="translate(25, 96)">
      <text x="2" y="13" font-size="11" fill="#434d58">Rails-Assets</text>
      <text x="250" y="13" font-size="11" fill="#434d58" text-anchor="end">0.02</text>
      
    <svg width="180" x="0" y="20">
