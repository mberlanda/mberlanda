name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: mberlanda/github-readme-stats-action@v2.1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&role=OWNER,ORGANIZATION_MEMBER
          path: profile/stats.svg
          token: ${{ secrets.GRS_PAT }}
          debug_fetch: "true"

      - name: Generate top languages card
        uses: mberlanda/github-readme-stats-action@v2.1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=8&role=OWNER,ORGANIZATION_MEMBER&hide=HTML,CSS&lang_multiplier=Jupyter Notebook:0.1"
          path: profile/top-langs.svg
          token: ${{ secrets.GRS_PAT }}
          debug_fetch: "true"

      - name: Generate repo count by language card
        uses: mberlanda/github-readme-stats-action@v2.1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=8&role=OWNER,ORGANIZATION_MEMBER&hide=HTML,CSS&size_weight=0&count_weight=1&custom_title=Repo+distribution+by+language"
          path: profile/repo-count-by-lang.svg
          token: ${{ secrets.GRS_PAT }}

      - name: Generate language history card
        uses: mberlanda/github-readme-stats-action@v2.2
        with:
          card: lang-history
          options: "username=${{ github.repository_owner }}&role=OWNER,ORGANIZATION_MEMBER&langs_count=7&hide=HTML,CSS"
          path: profile/lang-history.svg
          token: ${{ secrets.GRS_PAT }}

      - name: Generate Stack Overflow card
        uses: mberlanda/github-readme-stats-action@feat/external-platform-cards
        with:
          card: stackoverflow
          options: "user_id=5687152&site=stackoverflow"
          path: profile/stackoverflow.svg
          token: ${{ secrets.GRS_PAT }}

      - name: Generate pin card
        uses: mberlanda/github-readme-stats-action@v2.1
        with:
          card: pin
          options: username=stats-organization&repo=github-readme-stats
          path: profile/pin-stats-organization-github-readme-stats.svg
          token: ${{ secrets.GRS_PAT }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
